<div class="flex min-h-screen bg-white">
  <app-side-bar>
    <mat-icon fontIcon="group" />
    <button aria-label="invitation" (click)="openInvitation()">
      <mat-icon fontIcon="attach_email" />
    </button>
    <button aria-label="show options" (click)="toggleVisbile()">
      <mat-icon fontIcon="settings" />
    </button>
  </app-side-bar>

  <main class="flex-1 flex flex-col">
    <div
      class="md:border-b md:shadow-title text-center py-2.5 w-full flex justify-center items-center gap-2"
    >
      <h1 class="text-4xl wrap-anywhere font-Julius">{{projectName()}}</h1>
      @if(isVisible() && (isModerator() || isAdmin())){
      <button class="flex" aria-label="edit name of project" (click)="edit()">
        <mat-icon fontIcon="edit" />
      </button>
      }
    </div>
    <nav
      class="flex-1 flex flex-col xl:flex-row justify-evenly items-center font-Julius text-[28px] px-5"
    >
      <a
        [routerLink]="['section']"
        class="rounded-[10px] border w-64 h-48 flex items-center justify-center bg-purple20"
        >Section</a
      >
      <a
        [routerLink]="['tchat']"
        class="rounded-[10px] border w-64 h-48 flex items-center justify-center bg-purple20"
      >
        Tchat
      </a>
    </nav>
    @if(isVisible()){
    <button
      class="absolute bottom-5 right-5"
      aria-label="delete or leave project"
      (click)="openModalLeave()"
    >
      <mat-icon fontIcon="delete" />
    </button>
    }
  </main>
</div>
