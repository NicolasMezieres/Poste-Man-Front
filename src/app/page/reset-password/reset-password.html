<div class="flex flex-col min-h-screen">
  <app-logo />
  <main class="flex-1">
    <h1 class="text-[32px] font-Julius">Authentification</h1>
    <form [formGroup]="formResetPassword">
      <h2 class="font-Julius text-[32px]">Réinitialisation de mot de passe</h2>
      <app-input-form
        inputId="passwordReset"
        label="Mot de passe"
        type="password"
        placeholder="Mot de passe"
        [control]="formResetPassword.controls.password"
      />
      <app-input-form
        inputId="confirmPasswordReset"
        label="Confirmation"
        type="password"
        placeholder="Confirmation"
        [control]="formResetPassword.controls.confirmPassword"
      />
      <button
        id="submitForgetPassword"
        type="submit"
        (click)="submitFormResetPassword($event)"
        class="bg-purple text-2xl text-white w-full py-2.5 rounded-[10px] shadowUnset col-span-2 place-self-center xl:w-1/2"
      >
        Confirmer
      </button>
    </form>
  </main>
  <app-footer />
</div>
