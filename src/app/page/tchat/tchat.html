<div
  class="flex flex-col h-screen overflow-hidden bg-white font-Agdasima gap-2.5 md:flex-row md:p-0 md:gap-0"
>
  <app-header-project-mobile class="md:hidden p-2.5" title="nom du projet" />
  <app-side-bar class="hidden md:block">
    <app-icon-back />
    <mat-icon fontIcon="group" />
    <mat-icon fontIcon="settings" />
  </app-side-bar>

  <main
    class="flex-1 flex flex-col gap-2.5 min-h-0 p-2.5 md:p-0 md:gap-5 md:pb-5"
  >
    <h1
      class="hidden md:block text-center font-Julius text-[32px] w-full border-b shadowTitle"
    >
      Nom du projet
    </h1>
    <section
      class="bg-purple20 p-2.5 rounded-[10px] text-xl flex-1 border overflow-scroll flex flex-col-reverse md:mx-5 md:px-5 lg:self-center lg:w-2/3 xl:w-1/2"
    >
      <article>
        <div class="flex items-center justify-between">
          <h1 class="text-2xl">Pseudo</h1>
          <app-icon-more />
        </div>
        <p class="bg-purple rounded-[10px] p-2.5 text-white">premier message</p>
        <p class="text-end">Date 1</p>
      </article>
    </section>
    <form class="w-full flex justify-between self-center md:max-w-72">
      <input
        placeholder="Message..."
        class="px-2.5 bg-purple20 flex-1 rounded-l-[10px] border"
      />
      <button class="bg-purple border">
        <mat-icon fontIcon="send" class="sendIcon" />
      </button>
    </form>
  </main>
</div>
