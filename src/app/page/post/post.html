<div
  class="flex flex-col h-screen overflow-hidden bg-white font-Agdasima gap-2.5 md:flex-row md:p-0 md:gap-0"
>
  <app-header-project-mobile class="md:hidden p-2.5" title="nom du projet" />

  <app-side-bar class="hidden md:block">
    <app-icon-back />
    <mat-icon fontIcon="group" />
    <mat-icon fontIcon="settings" />
  </app-side-bar>
  <main class="flex-1 relative overflow-scroll">
    @for (post of posts(); track $index) {
    <article class="w-72 grid grid-cols-1">
      <header
        class="flex justify-between bg-purple text-white border border-black rounded-t-[5px] px-5 py-2"
      >
        <div class="flex items-center gap-2.5">
          <button aria-label="upVote" class="flex items-center">
            <mat-icon fontIcon="arrow_upward" class="arrowIcon" />
          </button>
          <span class="text-xl">{{post.score}}</span>
          <button aria-label="downVote" class="flex items-center">
            <mat-icon fontIcon="arrow_downward" class="arrowIcon" />
          </button>
        </div>
        <h2 class="text-2xl wrap-anywhere text-center">
          {{post.user.username}}
        </h2>
      </header>
      <p class="text-xl p-2.5 border rounded-b-[5px]">{{post.text}}</p>
      <time datetime="01/01/1111 01:01" class="text-end text-xl py-2.5"
        >{{post.createdAt | date:'dd/MM/yyyy HH:mm'}}
      </time>
      @if(isAdmin() || isModerator() || post.user.username === username()){
      <div class="flex justify-between">
        @if(!isAdmin()){
        <button aria-label="modify post">
          <mat-icon fontIcon="edit" /></button
        >}
        <button aria-label="transfer post">
          <mat-icon fontIcon="drive_file_move_outline" />
        </button>
        <button aria-label="delete post">
          <mat-icon fontIcon="delete" />
        </button>
      </div>
      }
    </article>
    }@empty {
    <h1>Aucun post</h1>
    }
  </main>
</div>
